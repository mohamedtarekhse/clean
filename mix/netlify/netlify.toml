[build]
  base    = "."
  publish = "."         # folder containing your built frontend files
  command = "echo 'Static site – no build step needed'"

# ── Dev server (netlify dev) ──────────────────────────────────────────────────
[dev]
  port    = 8888
  publish = "."

# ── HTTP Headers ─────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Redirect: proxy /api/* → Railway backend (avoids CORS from browser) ───────
# Replace https://your-api.railway.app with your actual Railway URL
[[redirects]]
  from   = "/api/*"
  to     = "https://your-api.railway.app/api/:splat"
  status = 200
  force  = true
  [redirects.headers]
    x-api-key = "YOUR_API_SECRET_KEY_HERE"

# ── SPA fallback (if you ever bundle the frontend as a SPA) ──────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
